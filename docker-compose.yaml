services:
    redis:
        profiles: ["dev", "test"]
        image: redis:latest
        container_name: redis_container
        environment:
            - REDIS_PASSWORD=${REDIS_USER_PASSWORD}
            - REDIS_USER=${REDIS_USER}
            - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
        ports:
            - ${REDIS_PORT}:6379
        deploy:
            resources:
                limits:
                   cpus: '0.50'
                   memory: 512M
                reservations:
                   cpus: '0.25'
                   memory: 256M
        command: >
            sh -c '
                mkdir -p /usr/local/etc/redis &&
                echo "bind 0.0.0.0" > /usr/local/etc/redis/redis.conf &&
                echo "requirepass $REDIS_USER_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
                echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&
                echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&
                echo "user default on nopass ~* +@all" > /usr/local/etc/redis/users.acl &&
                echo "user $REDIS_USER on >$REDIS_USER_PASSWORD ~* +@all" >> /usr/local/etc/redis/users.acl &&
                redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl
            '
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "$REDIS_USER_PASSWORD", "ping"]
            interval: 30s
            timeout: 10s
            retries: 5
        restart: unless-stopped
        tty: true
        stdin_open: true
    postgres:
        profiles: ["dev", "test"]
        container_name: ${POSTGRES_CONTAINER_NAME}
        image: postgres:latest
        restart: always
        env_file:
            - ".env"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            PGDATA: /var/lib/postgresql/data/pgdata
        
        volumes:
            - postgres_data:/var/lib/postgresql/data/pgdata
        
        ports:
            - ${POSTGRES_PORT}:5432
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
    rabbitmq:
        profiles: ["dev", "test"]
        image: rabbitmq:3-management-alpine
        hostname: rabbitmq
        container_name: rabbitmq
        ports:
            - "${RABBITMQ_PORT}:5672"
            - "${RABBITMQ_MANAGEMENT_PORT}:15672"
        env_file:
            - ".env"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq

    minio:
        image: minio/minio:latest
        container_name: minio
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
            - MINIO_DEFAULT_BUCKETS=buck1
        command: [ "server", "--console-address", ":9001", "/data" ]
        volumes:
            - minio_data:/data
        ports:
            - "9000:${MINIO_S3_PORT}"
            - "9001:${MINIO_MANAGEMENT_PORT}"
        env_file:
            - ".env"

    maildev:
      profiles: ["test"]
      image: maildev/maildev
      environment:
        - TZ=Europe/Moscow
        - MAILDEV_WEB_PORT=${MAILDEV_WEB_PORT}
        - MAILDEV_SMTP_PORT=${MAILDEV_SMTP_PORT}
      ports:
        - "${MAILDEV_WEB_PORT}:1080"
        - "${MAILDEV_SMTP_PORT}:1025"
      env_file:
            - ".test-env"
      logging:
        driver: "json-file"
        options:
          max-size: "1m"
volumes:
    postgres_data:
    rabbitmq-data:
    minio_data: